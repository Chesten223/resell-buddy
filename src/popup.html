<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 340px; font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; padding: 16px; }
    h2 { font-size: 16px; color: #7c3aed; margin-bottom: 8px; }
    h3 { font-size: 13px; color: #888; margin: 12px 0 6px; text-transform: uppercase; }
    label { font-size: 12px; color: #aaa; display: block; margin: 6px 0 2px; }
    input[type="number"], input[type="text"] {
      width: 100%; padding: 6px 8px; border: 1px solid #333; border-radius: 4px;
      background: #0a0a1a; color: #eee; font-size: 12px;
    }
    input:focus { border-color: #7c3aed; outline: none; }
    .row { display: flex; gap: 8px; }
    .row > div { flex: 1; }
    .btn {
      display: block; width: 100%; padding: 8px; border: none; border-radius: 6px;
      cursor: pointer; font-size: 13px; font-weight: 600; margin-top: 8px;
    }
    .btn-primary { background: #7c3aed; color: white; }
    .btn-secondary { background: #0f3460; color: #ccc; }
    .status { font-size: 12px; margin-top: 8px; text-align: center; }
    .status.pro { color: #22c55e; }
    .status.err { color: #e74c3c; }
    .tab-bar { display: flex; gap: 2px; margin-bottom: 12px; }
    .tab-btn { flex: 1; padding: 6px; border: none; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 12px; font-weight: 600; background: #0f3460; color: #aaa; }
    .tab-btn.active { background: #7c3aed; color: white; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .stat-card { background: #0a0a1a; border: 1px solid #222; border-radius: 8px; padding: 10px; text-align: center; }
    .stat-card .num { font-size: 24px; font-weight: 700; }
    .stat-card .lbl { font-size: 10px; color: #666; text-transform: uppercase; margin-top: 2px; }
    .bar { height: 6px; border-radius: 3px; background: #222; margin-top: 4px; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
    .history-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #111; font-size: 11px; }
</head>
<body>
  <h2>⚡ ResellBuddy</h2>
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="settings">⚙️ Settings</button>
    <button class="tab-btn" data-tab="analytics">📊 Analytics</button>
  </div>

  <div class="tab-panel active" id="tab-settings">

  <h3>Poshmark Settings</h3>
  <div class="row">
    <div><label>Share Count</label><input type="number" id="pm-share-count" value="50" min="1" max="500"></div>
    <div><label>Like Count</label><input type="number" id="pm-like-count" value="30" min="1" max="200"></div>
    <div><label>Follow Count</label><input type="number" id="pm-follow-count" value="20" min="1" max="100"></div>
  </div>
  <div class="row" style="margin-top:6px">
    <div><label>Delay Min (sec)</label><input type="number" id="pm-delay-min" value="3" min="1" max="30"></div>
    <div><label>Delay Max (sec)</label><input type="number" id="pm-delay-max" value="8" min="1" max="60"></div>
  </div>
  <div class="divider"></div>
  <h3>💰 Offer to Likers (Pro)</h3>
  <div class="row">
    <div><label>Discount %</label><input type="number" id="pm-offer-discount" value="10" min="5" max="50"></div>
    <div><label>Min Price ($)</label><input type="number" id="pm-offer-min-price" value="5" min="1" max="999"></div>
    <div><label>Max/Run</label><input type="number" id="pm-offer-max" value="20" min="1" max="20"></div>
  </div>
  <div class="divider"></div>
  <h3>📦 Auto-Relist (Pro)</h3>
  <div class="row">
    <div><label>Max Relist/Run</label><input type="number" id="pm-relist-max" value="10" min="1" max="50"></div>
  </div>
  <div class="divider"></div>
  <h3>🔄 Unfollow Settings</h3>
  <div class="row">
    <div><label>Max Unfollow/Run</label><input type="number" id="pm-unfollow-count" value="30" min="1" max="100"></div>
  </div>
  <button class="btn btn-primary" id="save-settings">💾 Save Settings</button>

  <div class="divider"></div>

  <h3>⏰ Scheduler (Pro)</h3>
  <label>Enable Auto-Share Schedule</label>
  <div class="row">
    <div><label>Interval (hours)</label><input type="number" id="sched-interval" value="4" min="1" max="24"></div>
    <div><label>Actions/Run</label><input type="number" id="sched-actions" value="20" min="1" max="100"></div>
  </div>
  <div class="row" style="margin-top:6px">
    <div><label>Start Hour (0-23)</label><input type="number" id="sched-start" value="8" min="0" max="23"></div>
    <div><label>End Hour (0-23)</label><input type="number" id="sched-end" value="22" min="0" max="23"></div>
  </div>
  <div class="row" style="margin-top:6px">
    <button class="btn btn-primary" id="sched-enable" style="flex:1">▶ Start Schedule</button>
    <button class="btn btn-secondary" id="sched-disable" style="flex:1">⏹ Stop</button>
  </div>
  <div class="status" id="sched-status">Scheduler inactive</div>
  <div class="divider"></div>
  <h3>🏷️ Price Suggestion</h3>
  <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
    <input type="checkbox" id="price-suggestion-toggle" checked> Show price suggestions on listings
  </label>
  <div style="font-size:10px;color:#666;margin-top:4px">Extracts brand from page, shows competitor pricing badge</div>

  <div class="divider"></div>
  <h3>📝 Bulk Listing Drafts</h3>
  <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
    <input type="checkbox" id="bulk-drafts-toggle" checked> Enable draft saving
  </label>
  <div style="display:flex;gap:4px;margin-top:6px">
    <button class="btn btn-secondary" id="save-draft-btn" style="font-size:11px;padding:6px;flex:1">💾 Save Draft</button>
    <button class="btn btn-secondary" id="view-drafts-btn" style="font-size:11px;padding:6px;flex:1">📋 View Drafts</button>
  </div>
  <div id="drafts-list" style="max-height:100px;overflow-y:auto;margin-top:4px;font-size:11px;color:#aaa"></div>

  <div class="divider"></div>
  <h3>⏰ Smart Share Scheduler</h3>
  <label>Optimal times (EST): 10am, 2pm, 8pm</label>
  <div class="row" style="margin-top:4px">
    <div><label>Interval (hours)</label><input type="number" id="smart-share-interval" value="6" min="1" max="24"></div>
    <div><label>Times (comma sep)</label><input type="text" id="smart-share-times" value="10:00,14:00,20:00"></div>
  </div>
  <div class="row" style="margin-top:6px">
    <button class="btn btn-primary" id="smart-share-enable" style="flex:1">▶ Start Smart Share</button>
    <button class="btn btn-secondary" id="smart-share-disable" style="flex:1">⏹ Stop</button>
  </div>
  <div class="status" id="smart-share-status">Smart share inactive</div>

  <div class="divider"></div>

  <h3>Pro License</h3>
  <label>License Key</label>
  <input type="text" id="license-key" placeholder="Enter your license key">
  <button class="btn btn-secondary" id="activate-license">🔑 Activate Pro</button>
  <div style="margin-top:6px;font-size:11px;color:#666">
    Get Pro at <a href="#" style="color:#7c3aed">resellbuddy.com</a> — $9/month
  </div>

  <div class="status" id="status">Free version — 50 actions/day limit</div>

  <div class="divider"></div>
  <h3>💾 Backup</h3>
  <div class="row" style="gap:4px">
    <button class="btn btn-secondary" id="export-settings" style="font-size:11px;padding:6px">Export</button>
    <button class="btn btn-secondary" id="import-settings" style="font-size:11px;padding:6px">Import</button>
    <input type="file" id="import-file" accept=".json" style="display:none">
  </div>
  </div><!-- end tab-settings -->

  <div class="tab-panel" id="tab-analytics">
    <h3 style="margin-bottom:8px">📊 Dashboard</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px">
      <div class="stat-card"><div class="num" id="dash-total" style="color:#22c55e">0</div><div class="lbl">Today</div></div>
      <div class="stat-card"><div class="num" id="dash-week" style="color:#58a6ff">0</div><div class="lbl">This Week</div></div>
      <div class="stat-card"><div class="num" id="dash-saved" style="color:#d2a8ff">0h</div><div class="lbl">Time Saved</div></div>
    </div>

    <h3>📈 7-Day Trend</h3>
    <div id="trend-chart" style="background:#0a0a1a;border-radius:8px;padding:8px;height:100px;display:flex;align-items:flex-end;gap:4px;margin-bottom:12px"></div>

    <h3>📋 Action Breakdown</h3>
    <div id="action-breakdown" style="margin-bottom:12px">
      <div class="history-row"><span>📤 Shares</span><span id="bd-share">0</span></div>
      <div class="bar"><div class="bar-fill" id="bd-share-bar" style="width:0%;background:#22c55e"></div></div>
      <div class="history-row"><span>❤️ Likes</span><span id="bd-like">0</span></div>
      <div class="bar"><div class="bar-fill" id="bd-like-bar" style="width:0%;background:#58a6ff"></div></div>
      <div class="history-row"><span>👤 Follows</span><span id="bd-follow">0</span></div>
      <div class="bar"><div class="bar-fill" id="bd-follow-bar" style="width:0%;background:#d2a8ff"></div></div>
      <div class="history-row"><span>💰 Offers</span><span id="bd-offer">0</span></div>
      <div class="bar"><div class="bar-fill" id="bd-offer-bar" style="width:0%;background:#f59e0b"></div></div>
      <div class="history-row"><span>📦 Relists</span><span id="bd-relist">0</span></div>
      <div class="bar"><div class="bar-fill" id="bd-relist-bar" style="width:0%;background:#ef4444"></div></div>
      <div class="history-row"><span>🔄 Unfollows</span><span id="bd-unfollow">0</span></div>
      <div class="bar"><div class="bar-fill" id="bd-unfollow-bar" style="width:0%;background:#8b5cf6"></div></div>
    </div>

    <h3>📅 Recent History</h3>
    <div id="history-list" style="max-height:120px;overflow-y:auto;font-size:11px;color:#aaa"></div>
    <div style="margin-top:8px">
      <button class="btn btn-primary" id="export-csv" style="font-size:12px;padding:8px">📊 Export Analytics as CSV</button>
    </div>

    <div class="divider"></div>
    <div class="status" id="status">Free version — 50 actions/day limit</div>
  </div><!-- end tab-analytics -->

</body>
<script src="src/popup.js"></script>
</body>
</html>
